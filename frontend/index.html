<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DocSystem</title>
    <link rel="stylesheet" href="css/style.css?v=1784057472977">

    <!-- Frameworks (Phosphor Icons & Tailwind) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false }
      }
    </script>
</head>
<body class="login-page relative overflow-hidden h-screen flex items-center justify-center">

    <!-- Animated Background Elements -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-[var(--primary-600)] rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-40 -right-40 w-96 h-96 bg-[var(--primary-700)] rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-40 left-20 w-96 h-96 bg-[var(--primary-500)] rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Login Glass Card -->
    <div class="login-container relative z-10 w-full max-w-md p-6">
        <div class="glass-card w-full rounded-2xl shadow-2xl overflow-hidden backdrop-blur-xl border border-[var(--glass-border)] bg-[var(--glass-bg)] p-8">
            
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-tr from-[var(--primary-700)] to-[var(--primary-400)] text-white shadow-lg mb-4">
                    <i class="ph ph-file-text text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-[var(--text-main)] to-[var(--primary-500)] tracking-tight">DocSystem</h1>
                <p class="text-[var(--text-muted)] mt-2 text-sm font-medium">Gestão inteligente e segura</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="form-group relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-[var(--text-light)]">
                        <i class="ph ph-envelope-simple text-xl"></i>
                    </div>
                    <input type="email" id="email" required placeholder="Seu e-mail" 
                           class="block w-full pl-10 pr-3 py-3 border border-[var(--border-subtle)] rounded-xl bg-[var(--bg-panel-muted)] text-[var(--text-main)] placeholder-[var(--text-light)] focus:ring-2 focus:ring-[var(--primary-500)] focus:border-[var(--primary-500)] focus:bg-[var(--bg-panel)] transition-all outline-none">
                </div>

                <div class="form-group relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-[var(--text-light)]">
                        <i class="ph ph-lock-key text-xl"></i>
                    </div>
                    <input type="password" id="senha" required placeholder="Sua senha" 
                           class="block w-full pl-10 pr-3 py-3 border border-[var(--border-subtle)] rounded-xl bg-[var(--bg-panel-muted)] text-[var(--text-main)] placeholder-[var(--text-light)] focus:ring-2 focus:ring-[var(--primary-500)] focus:border-[var(--primary-500)] focus:bg-[var(--bg-panel)] transition-all outline-none">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-gradient-to-r from-[var(--primary-600)] to-[var(--primary-500)] hover:from-[var(--primary-700)] hover:to-[var(--primary-600)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[var(--primary-500)] transition-all transform hover:-translate-y-0.5">
                        Entrar no Sistema
                        <i class="ph-bold ph-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
        
        <div class="text-center mt-6">
            <p class="text-xs text-[var(--text-light)] font-medium">
                Desenvolvido com <i class="ph-fill ph-heart text-[var(--primary-500)]"></i> para alta performance
            </p>
        </div>
    </div>

    <!-- Scripts da aplicação -->
    <script src="js/auth.js"></script>
    <script src="js/ui-core.js"></script>
</body>
</html>
